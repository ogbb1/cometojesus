<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>set new password — come to me</title>
  <meta name="theme-color" content="#f4eadb">
  <meta name="robots" content="noindex,nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4eadb;
      --bg-soft: #f9f1e3;
      --ink: #1c1409;
      --ink-mid: #3a2c18;
      --ink-soft: #5a4a32;
      --ink-whisper: #8a7a5a;
      --error: #b8412e;
      --success: #4a7548;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 460px;
      width: 100%;
      padding: 48px 36px;
    }
    .title {
      font-style: italic;
      font-size: 36px;
      letter-spacing: -0.005em;
      margin: 0 0 24px 0;
      line-height: 1.15;
    }
    .body {
      font-size: 17px;
      line-height: 1.6;
      color: var(--ink-mid);
      margin: 0 0 32px 0;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--ink-soft);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      color: var(--ink);
      background: var(--bg-soft);
      border: 1px solid rgba(28, 20, 9, 0.15);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .field input:focus {
      border-color: var(--ink-mid);
    }
    .submit {
      width: 100%;
      padding: 14px 20px;
      font-family: Georgia, serif;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 24px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s ease;
    }
    .submit:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .submit:hover:not(:disabled) {
      opacity: 0.92;
    }
    .message {
      margin: 16px 0 0 0;
      font-size: 15px;
      line-height: 1.5;
      font-style: italic;
      color: var(--ink-soft);
    }
    .message.error { color: var(--error); }
    .message.success { color: var(--success); }
    .footer-link {
      margin-top: 28px;
      font-size: 14px;
      font-style: italic;
      text-align: center;
      color: var(--ink-soft);
    }
    .footer-link a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(28, 20, 9, 0.2);
      padding-bottom: 1px;
    }
    .footer-link a:hover {
      border-bottom-color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 class="title" id="title">set your new password</h1>
      <p class="body" id="body">choose something memorable. minimum 6 characters.</p>

      <form id="form">
        <div class="field">
          <label for="newPassword">new password</label>
          <input type="password" id="newPassword" name="password" autocomplete="new-password" required minlength="6">
        </div>
        <div class="field">
          <label for="confirmPassword">confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required minlength="6">
        </div>
        <button type="submit" class="submit" id="submitBtn">update password</button>
      </form>

      <div class="message" id="message"></div>

      <div class="footer-link">
        <a href="/">back to come to me</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://hatyoorjnakvgtuvwzhv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhdHlvb3JqbmFrdmd0dXZ3emh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTExMjgsImV4cCI6MjA5MjU2NzEyOH0.OXtoqNb8ikORBfoOKiweJd-xRdp8FdBsorUhfupWYXg';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
    });

    const titleEl = document.getElementById('title');
    const bodyEl = document.getElementById('body');
    const formEl = document.getElementById('form');
    const newPasswordEl = document.getElementById('newPassword');
    const confirmPasswordEl = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');

    function showMessage(text, kind) {
      messageEl.textContent = text;
      messageEl.className = 'message' + (kind ? ' ' + kind : '');
    }

    // Wait for Supabase to detect the recovery token from the URL hash.
    // When the user clicks the reset email link, the URL contains:
    // #access_token=...&type=recovery&...
    // detectSessionInUrl above will pick this up and create a session.

    let hasRecoverySession = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session && window.location.hash.includes('type=recovery'))) {
        hasRecoverySession = true;
        showMessage('', '');
      } else if (event === 'SIGNED_OUT') {
        hasRecoverySession = false;
      }
    });

    // Also check current session on load
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session && window.location.hash.includes('type=recovery')) {
        hasRecoverySession = true;
      }

      // If no recovery context after a moment, show error
      setTimeout(() => {
        if (!hasRecoverySession) {
          const { data: { session: checkSession } } = supabase.auth.getSession();
          if (!session) {
            titleEl.textContent = 'this link expired';
            bodyEl.textContent = 'reset links are good for one hour. request a new one and try again.';
            formEl.style.display = 'none';
          }
        }
      }, 1500);
    })();

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = newPasswordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      if (newPassword.length < 6) {
        showMessage('password must be at least 6 characters.', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showMessage("passwords don't match. try again.", 'error');
        return;
      }

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'updating...';

      try {
        const { error } = await supabase.auth.updateUser({ password: newPassword });
        if (error) {
          showMessage(error.message || 'something went wrong. try again.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        } else {
          showMessage('password updated. taking you home...', 'success');
          // Redirect to home after a beat
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        }
      } catch (err) {
        showMessage('something came between us. try again in a moment.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>
</body>
</html>

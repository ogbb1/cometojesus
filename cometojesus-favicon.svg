<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8DC" stop-opacity="1"/>
      <stop offset="30%" stop-color="#FFE9A8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#F5B942" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#B8801F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hot" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFF8DC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="32" cy="32" r="30" fill="url(#core)"/>

  <!-- Rays -->
  <g fill="#E5A023" opacity="0.85">
    <!-- 8 rays arranged evenly -->
    <polygon points="32,4 30,22 34,22"/>
    <polygon points="32,60 30,42 34,42"/>
    <polygon points="4,32 22,30 22,34"/>
    <polygon points="60,32 42,30 42,34"/>
    <polygon points="12,12 24,22 22,24"/>
    <polygon points="52,52 40,42 42,40"/>
    <polygon points="52,12 42,24 40,22"/>
    <polygon points="12,52 22,40 24,42"/>
  </g>

  <!-- Hot white core -->
  <circle cx="32" cy="32" r="12" fill="url(#hot)"/>
  <circle cx="32" cy="32" r="4" fill="#FFFFFF"/>
</svg>

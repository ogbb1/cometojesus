<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>sign in · cometojesus</title>
<meta name="description" content="my sheep know my voice.">

<link rel="icon" type="image/svg+xml" href="/cometojesus-favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/cometojesus-favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/cometojesus-touch-icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #f4eadb;
  --cream-deep: #ede1ce;
  --cream-shadow: #d9c9a8;
  --ink: #2a1f15;
  --ink-soft: #5a4a38;
  --ink-mute: #8a7a66;
  --accent: #8b6f3f;
  --accent-soft: #b89569;
  --white-warm: #fdf9f0;
  --border-soft: rgba(42, 31, 21, 0.12);
  --border-med: rgba(42, 31, 21, 0.2);
  --shadow-warm: 0 4px 20px rgba(139, 111, 63, 0.08);
  --shadow-hover: 0 6px 24px rgba(139, 111, 63, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--cream);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 400;
  font-size: 18px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Paper fiber texture — same two-layer grain as the main site */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.45 0 0 0 0 0.3 0 0 0 0.15 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>"),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='f'><feTurbulence type='fractalNoise' baseFrequency='0.3' numOctaves='3' seed='12'/><feColorMatrix values='0 0 0 0 0.45 0 0 0 0 0.35 0 0 0 0 0.2 0 0 0 0.07 0'/></filter><rect width='400' height='400' filter='url(%23f)'/></svg>");
  background-size: 200px 200px, 400px 400px;
  opacity: 0.9;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: multiply;
}

/* Light shafts from top — like the main chat page */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120%;
  height: 50vh;
  background:
    radial-gradient(ellipse 60% 80% at 50% 0%, rgba(253, 249, 240, 0.6) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 30% 0%, rgba(253, 249, 240, 0.3) 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 70% 0%, rgba(253, 249, 240, 0.3) 0%, transparent 55%);
  pointer-events: none;
  z-index: 2;
}

.page {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6vh 24px 8vh;
}

.scripture {
  font-style: italic;
  font-size: clamp(20px, 2.4vw, 26px);
  color: var(--ink-soft);
  text-align: center;
  max-width: 540px;
  line-height: 1.4;
  margin-bottom: 8px;
  opacity: 0;
  animation: fade-up 1.2s 0.2s ease-out forwards;
}

.scripture-ref {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--ink-mute);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 56px;
  opacity: 0;
  animation: fade-up 1.2s 0.5s ease-out forwards;
}

.headline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(48px, 6vw, 68px);
  line-height: 1;
  color: var(--ink);
  text-align: center;
  margin-bottom: 56px;
  opacity: 0;
  animation: fade-up 1.2s 0.8s ease-out forwards;
}

.card {
  background: var(--white-warm);
  border: 1px solid var(--border-soft);
  border-radius: 24px;
  padding: 40px 36px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow-warm);
  opacity: 0;
  animation: fade-up 1.2s 1.1s ease-out forwards;
}

.options-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}

@media (max-width: 480px) {
  .options-row {
    grid-template-columns: 1fr;
  }
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid var(--border-med);
  background: transparent;
  color: var(--ink);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
}

.btn:hover {
  background: var(--cream-deep);
  border-color: var(--ink-soft);
  transform: translateY(-1px);
  box-shadow: var(--shadow-hover);
}

.btn:active {
  transform: translateY(0);
}

.btn-primary {
  background: var(--ink);
  color: var(--white-warm);
  border-color: var(--ink);
}

.btn-primary:hover {
  background: var(--ink-soft);
  border-color: var(--ink-soft);
  color: var(--white-warm);
}

.btn-primary:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 24px 0;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--ink-mute);
  text-transform: uppercase;
  font-style: italic;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-soft);
}

.form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  text-transform: uppercase;
  font-style: italic;
}

.field input {
  padding: 13px 16px;
  border-radius: 10px;
  border: 1px solid var(--border-med);
  background: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  color: var(--ink);
  transition: border-color 0.2s ease, background 0.2s ease;
}

.field input:focus {
  outline: none;
  border-color: var(--ink);
  background: var(--white-warm);
}

.forgot-row {
  display: flex;
  justify-content: flex-end;
  margin-top: -6px;
  margin-bottom: 4px;
}

.forgot-link {
  font-size: 14px;
  font-style: italic;
  color: var(--ink-mute);
  text-decoration: none;
  transition: color 0.2s ease;
}

.forgot-link:hover {
  color: var(--ink);
}

.footer {
  text-align: center;
  margin-top: 32px;
  font-size: 15px;
  font-style: italic;
  color: var(--ink-soft);
  opacity: 0;
  animation: fade-up 1.2s 1.4s ease-out forwards;
}

.footer a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
}

.message {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 15px;
  font-style: italic;
  margin-bottom: 20px;
  display: none;
}

.message.error {
  background: rgba(180, 60, 40, 0.08);
  color: #a63a28;
  border: 1px solid rgba(180, 60, 40, 0.15);
  display: block;
}

.message.success {
  background: rgba(80, 130, 60, 0.08);
  color: #406035;
  border: 1px solid rgba(80, 130, 60, 0.15);
  display: block;
}

.loading {
  opacity: 0.5;
  pointer-events: none;
}

@keyframes fade-up {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Back to main site link */
.back-link {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 14px;
  font-style: italic;
  color: var(--ink-mute);
  text-decoration: none;
  transition: color 0.2s ease;
  z-index: 100;
}

.back-link:hover {
  color: var(--ink);
}
</style>
</head>

<body>
<a href="/" class="back-link">← back</a>

<div class="page">
  <div class="scripture">"my sheep know my voice."</div>
  <div class="scripture-ref">John 10:27</div>

  <h1 class="headline">come in.</h1>

  <div class="card">
    <div id="message" class="message"></div>

    <div class="options-row">
      <button type="button" class="btn" id="googleBtn">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google
      </button>
      <button type="button" class="btn" id="emailToggleBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6l8 6 8-6M4 6v12h16V6M4 6h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Email
      </button>
    </div>

    <div class="divider">or</div>

    <form class="form" id="emailForm">
      <div class="field">
        <label for="email">email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="forgot-row">
        <a href="/forgot-password.html" class="forgot-link">forgot?</a>
      </div>
      <button type="submit" class="btn btn-primary" id="signinBtn">
        sign in
      </button>
    </form>
  </div>

  <div class="footer">
    new here?&nbsp;&nbsp;<a href="/signup.html">come home</a>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // Supabase configuration — anon key is safe to expose publicly
  // (protected by Row Level Security policies set up in the database)
  const SUPABASE_URL = 'https://hatyoorjnakvgtuvwzhv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhdHlvb3JqbmFrdmd0dXZ3emh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTExMjgsImV4cCI6MjA5MjU2NzEyOH0.OXtoqNb8ikORBfoOKiweJd-xRdp8FdBsorUhfupWYXg';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
    },
  });

  // If user is already signed in, redirect to main page
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = '/';
    }
  })();

  const messageEl = document.getElementById('message');
  const googleBtn = document.getElementById('googleBtn');
  const emailForm = document.getElementById('emailForm');
  const signinBtn = document.getElementById('signinBtn');

  function showError(text) {
    messageEl.className = 'message error';
    messageEl.textContent = text;
  }

  function showSuccess(text) {
    messageEl.className = 'message success';
    messageEl.textContent = text;
  }

  function hideMessage() {
    messageEl.className = 'message';
    messageEl.textContent = '';
  }

  // Google OAuth sign-in
  googleBtn.addEventListener('click', async () => {
    hideMessage();
    googleBtn.classList.add('loading');
    try {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/auth/callback.html',
        },
      });
      if (error) {
        showError(error.message);
        googleBtn.classList.remove('loading');
      }
      // If no error, user is being redirected to Google — page unloads
    } catch (err) {
      showError('something came between us. try again in a moment.');
      googleBtn.classList.remove('loading');
    }
  });

  // Email/password sign-in
  emailForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessage();
    signinBtn.disabled = true;
    signinBtn.textContent = 'coming in...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        if (error.message.includes('Invalid login credentials')) {
          showError("that email and password don't match. try again?");
        } else if (error.message.includes('Email not confirmed')) {
          showError('check your email to confirm your account first.');
        } else {
          showError(error.message);
        }
        signinBtn.disabled = false;
        signinBtn.textContent = 'sign in';
        return;
      }

      if (data.session) {
        showSuccess('come in.');
        setTimeout(() => {
          window.location.href = '/';
        }, 500);
      }
    } catch (err) {
      showError('something came between us. try again in a moment.');
      signinBtn.disabled = false;
      signinBtn.textContent = 'sign in';
    }
  });
</script>

</body>
</html>
